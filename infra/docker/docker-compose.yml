services:
  proxy:
    image: caddy:2.10.0
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - webui

  cloudflared:
    image: cloudflare/cloudflared:2025.2.1
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - proxy
    profiles:
      - edge
    restart: unless-stopped

  webui:
    image: ghcr.io/open-webui/open-webui:v0.8.10
    environment:
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URLS: http://host.docker.internal:1236/v1
      OPENAI_API_KEYS: ""
      ENABLE_OLLAMA_API: "false"
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      - api
    extra_hosts:
      - host.docker.internal:host-gateway

  api:
    build:
      context: ../../apps/api
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - host.docker.internal:host-gateway

  worker:
    build:
      context: ../../apps/workers
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - host.docker.internal:host-gateway

  browser-runner:
    build:
      context: ../../apps/browser-runner
    environment:
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
    profiles:
      - automation

  guacd:
    image: guacamole/guacd:1.6.0
    command:
      - /opt/guacamole/sbin/guacd
      - -f
      - -b
      - 0.0.0.0
      - -L
      - ${GUACD_LOG_LEVEL:-debug}
    profiles:
      - remote-desktop
    restart: unless-stopped
    extra_hosts:
      - host.docker.internal:host-gateway

  guacamole-init:
    image: alpine:3.21
    command:
      - /bin/sh
      - /scripts/render-guacamole-user-mapping.sh
      - /config
    environment:
      GUACAMOLE_USERNAME: ${GUACAMOLE_USERNAME:-operator}
      GUACAMOLE_PASSWORD: ${GUACAMOLE_PASSWORD:-}
      GUACAMOLE_CONNECTION_NAME: ${GUACAMOLE_CONNECTION_NAME:-Mac Mini Desktop}
      GUACAMOLE_VNC_HOST: ${GUACAMOLE_VNC_HOST:-host.docker.internal}
      GUACAMOLE_VNC_PORT: ${GUACAMOLE_VNC_PORT:-5900}
      GUACAMOLE_VNC_USERNAME: ${GUACAMOLE_VNC_USERNAME:-}
      GUACAMOLE_VNC_USE_LOGIN_PASSWORD: ${GUACAMOLE_VNC_USE_LOGIN_PASSWORD:-false}
      GUACAMOLE_VNC_PASSWORD: ${GUACAMOLE_VNC_PASSWORD:-}
    volumes:
      - guacamole_home:/config
      - ../scripts/render-guacamole-user-mapping.sh:/scripts/render-guacamole-user-mapping.sh:ro
    profiles:
      - remote-desktop

  guacamole:
    image: guacamole/guacamole:1.6.0
    environment:
      GUACD_HOSTNAME: guacd
      WEBAPP_CONTEXT: guacamole
      REMOTE_IP_VALVE_ENABLED: "true"
    volumes:
      - guacamole_home:/etc/guacamole
    depends_on:
      guacd:
        condition: service_started
      guacamole-init:
        condition: service_completed_successfully
    profiles:
      - remote-desktop
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:1.111.0
    env_file:
      - ../../.env
    ports:
      - "5678:5678"
    environment:
      DB_SQLITE_POOL_SIZE: ${DB_SQLITE_POOL_SIZE:-2}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://127.0.0.1:5678}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: ${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:-false}
      N8N_HOST: ${N8N_HOST:-127.0.0.1}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_RUNNERS_ENABLED: ${N8N_RUNNERS_ENABLED:-true}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

  postgres:
    image: postgres:17.5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-assistant}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8.2.1
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  caddy_data:
  caddy_config:
  openwebui_data:
  n8n_data:
  postgres_data:
  redis_data:
  guacamole_home:
