services:
  proxy:
    image: caddy:2.10.0
    ports:
      - "80:80"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile
      - ${AI_STORAGE_ROOT:-/Volumes/ExtData/ai-assistant}/docker/caddy/data:/data
      - ${AI_STORAGE_ROOT:-/Volumes/ExtData/ai-assistant}/docker/caddy/config:/config
    depends_on:
      - api
      - webui

  cloudflared:
    image: cloudflare/cloudflared:2025.2.1
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - proxy
    profiles:
      - edge
    restart: unless-stopped

  webui:
    image: ghcr.io/open-webui/open-webui:v0.8.10
    environment:
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URLS: http://api:8000/v1
      OPENAI_API_KEYS: "${API_KEY:-}"
      ENABLE_OLLAMA_API: "false"
    volumes:
      - ${AI_STORAGE_ROOT:-/Volumes/ExtData/ai-assistant}/docker/openwebui:/app/backend/data
    depends_on:
      - api
    extra_hosts:
      - host.docker.internal:host-gateway

  api:
    build:
      context: ../../apps/api
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - host.docker.internal:host-gateway

  worker:
    build:
      context: ../../apps/workers
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - host.docker.internal:host-gateway

  browser-runner:
    build:
      context: ../../apps/browser-runner
    environment:
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
    profiles:
      - automation

  guacd:
    image: guacamole/guacd:1.6.0
    command:
      - /opt/guacamole/sbin/guacd
      - -f
      - -b
      - 0.0.0.0
      - -L
      - ${GUACD_LOG_LEVEL:-debug}
    profiles:
      - remote-desktop
    restart: unless-stopped
    extra_hosts:
      - host.docker.internal:host-gateway

  guacamole-init:
    image: alpine:3.21
    command:
      - /bin/sh
      - /scripts/render-guacamole-user-mapping.sh
      - /config
    environment:
      GUACAMOLE_USERNAME: ${GUACAMOLE_USERNAME:-operator}
      GUACAMOLE_PASSWORD: ${GUACAMOLE_PASSWORD:-}
      GUACAMOLE_CONNECTION_NAME: ${GUACAMOLE_CONNECTION_NAME:-Mac Mini Desktop}
      GUACAMOLE_VNC_HOST: ${GUACAMOLE_VNC_HOST:-host.docker.internal}
      GUACAMOLE_VNC_PORT: ${GUACAMOLE_VNC_PORT:-5900}
      GUACAMOLE_VNC_USERNAME: ${GUACAMOLE_VNC_USERNAME:-}
      GUACAMOLE_VNC_USE_LOGIN_PASSWORD: ${GUACAMOLE_VNC_USE_LOGIN_PASSWORD:-false}
      GUACAMOLE_VNC_PASSWORD: ${GUACAMOLE_VNC_PASSWORD:-}
      GUACAMOLE_VNC_COLOR_DEPTH: ${GUACAMOLE_VNC_COLOR_DEPTH:-16}
      GUACAMOLE_VNC_COMPRESS_LEVEL: ${GUACAMOLE_VNC_COMPRESS_LEVEL:-6}
      GUACAMOLE_VNC_QUALITY_LEVEL: ${GUACAMOLE_VNC_QUALITY_LEVEL:-5}
      GUACAMOLE_VNC_DISABLE_DISPLAY_RESIZE: ${GUACAMOLE_VNC_DISABLE_DISPLAY_RESIZE:-false}
      GUACAMOLE_VNC_ENABLE_AUDIO: ${GUACAMOLE_VNC_ENABLE_AUDIO:-false}
      GUACAMOLE_VNC_ENCODINGS: ${GUACAMOLE_VNC_ENCODINGS:-}
    volumes:
      - ${AI_STORAGE_ROOT:-/Volumes/ExtData/ai-assistant}/docker/guacamole:/config
      - ../scripts/render-guacamole-user-mapping.sh:/scripts/render-guacamole-user-mapping.sh:ro
    profiles:
      - remote-desktop

  guacamole:
    image: guacamole/guacamole:1.6.0
    environment:
      GUACD_HOSTNAME: guacd
      WEBAPP_CONTEXT: guacamole
      REMOTE_IP_VALVE_ENABLED: "true"
    volumes:
      - ${AI_STORAGE_ROOT:-/Volumes/ExtData/ai-assistant}/docker/guacamole:/etc/guacamole
    depends_on:
      guacd:
        condition: service_started
      guacamole-init:
        condition: service_completed_successfully
    profiles:
      - remote-desktop
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:2.12.3
    env_file:
      - ../../.env
    ports:
      - "5678:5678"
    environment:
      DB_SQLITE_POOL_SIZE: ${DB_SQLITE_POOL_SIZE:-2}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://127.0.0.1:5678}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: ${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:-false}
      N8N_MIGRATE_FS_STORAGE_PATH: ${N8N_MIGRATE_FS_STORAGE_PATH:-true}
      N8N_HOST: ${N8N_HOST:-127.0.0.1}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
    volumes:
      - ${AI_STORAGE_ROOT:-/Volumes/ExtData/ai-assistant}/docker/n8n:/home/node/.n8n
    depends_on:
      - postgres

  postgres:
    image: postgres:17.5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-assistant}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - ${AI_STORAGE_ROOT:-/Volumes/ExtData/ai-assistant}/docker/postgres:/var/lib/postgresql/data

  redis:
    image: redis:8.2.1
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${AI_STORAGE_ROOT:-/Volumes/ExtData/ai-assistant}/docker/redis:/data
